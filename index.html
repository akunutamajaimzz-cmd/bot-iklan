<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaimzz App</title>
    <!-- Memuat SDK AdsGram -->
    <script src="https://sad.adsgram.ai/js/adsgram.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Jaimzz Iklan</h1>
    <button id="btn">Tonton Iklan</button>

    <script>
        // Inisialisasi Adsgram dengan BlockId yang benar
        const AdController = window.Adsgram.init({ blockId: "int-35138" });

        const btn = document.getElementById("btn");
        btn.addEventListener("click", () => {
            AdController.show()
                .then((result) => {
                    // Iklan berhasil ditonton
                    console.log("Iklan selesai ditonton");
                })
                .catch((result) => {
                    // Iklan gagal atau dilewati
                    console.log("Iklan gagal atau dilewati");
                });
        });
    </script>
</body>
</html>
